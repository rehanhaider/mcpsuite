# Lightweight PR/main gate: install, build, test, typecheck. No secrets, no
# publishing — safe on fork PRs (read-only token). Releases live in release.yml.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # After setup-node on purpose: node 22 bundles corepack, newer runner
      # system nodes may not. No pnpm store cache — reliability over speed.
      - name: Set up pnpm 10 (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@latest-10 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build before typecheck: apps/web/src/routeTree.gen.ts is generated by
      # the build and gitignored — typecheck on a fresh clone fails without it.
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck
