# Self-hosting MCP Suite CRM with Docker Compose.
#   docker compose up -d          → everything on http://localhost:2222
# One service, one process: web UI, operation API, MCP for agents (POST /mcp)
# and health (GET /healthz) all share :2222. All state lives in ./data (one
# SQLite file + WAL sidecars). Back up that dir.
#
# First run against an empty ./data prints a ONE-TIME owner setup code in the
# logs (`docker compose logs emcp`) — redeem it at /set-password.
#
# Exposing to the internet: don't publish the port directly. Put a reverse
# proxy with TLS in front — see "Put it behind HTTPS" in PRODUCTION.md.
services:
  emcp:
    image: mcpsuite/crm
    build: .
    ports:
      - "2222:2222" # web UI + /api + /mcp (agents; per-agent API keys from Admin → Agents) + /healthz
    volumes:
      - ./data:/data
    environment:
      DB_PATH: /data/emcp.db
    restart: unless-stopped
